<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DESKnet Store Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    #pw-gate {
      position: fixed;
      inset: 0;
      z-index: 999999;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 1rem;
    }

    #pw-box {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      text-align: center;
    }

    #pw-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.75rem;
    }
    #pw-logo-img {
      height: 38px;
      width: auto;
      display: block;
    }
    #pw-logo-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }

    #pw-box h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.4rem;
      letter-spacing: -0.02em;
    }
    #pw-box p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 1.75rem;
    }

    #pw-input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 0.85rem;
    }
    #pw-input::placeholder { color: rgba(255,255,255,0.3); }
    #pw-input:focus { border-color: #6366f1; }

    #pw-btn {
      width: 100%;
      padding: 0.85rem 1rem;
      background: linear-gradient(135deg,#6366f1,#a855f7);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    #pw-btn:hover { opacity: 0.9; }
    #pw-btn:active { transform: scale(0.98); }

    #pw-error {
      margin-top: 0.85rem;
      font-size: 0.85rem;
      color: #f87171;
      min-height: 1.2em;
    }

    @media (max-width: 480px) {
      #pw-box { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- PASSWORD GATE -->
  <div id="pw-gate">
    <div id="pw-box">
      <div id="pw-logo">
        <img src="desknet logo.png" alt="DESKnet" id="pw-logo-img">
        <span id="pw-logo-text">DESKnet</span>
      </div>
      <h1>DESKnet Store Preview</h1>
      <p>Enter Password to Continue</p>
      <input id="pw-input" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="pw-btn" onclick="checkPw()">Continue →</button>
      <div id="pw-error"></div>
    </div>
  </div>

  <script>
    document.getElementById('pw-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPw();
    });
    function checkPw() {
      var val = document.getElementById('pw-input').value;
      if (val === 'Test@123') {
        window.location.href = 'home.html';
      } else {
        document.getElementById('pw-error').textContent = 'Incorrect Password';
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
      }
    }
  </script>

</body>
</html>
